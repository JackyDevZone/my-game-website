<!DOCTYPE html>
<html>
<head>
    <title>My Game Website</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
            background-color: lightblue;
        }

        button {
            padding: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h1>🎮 Click Game</h1>
    <p>Score: <span id="score">0</span></p>

    <button onclick="addScore()">Click Me!</button>

    <script>
        let score = 0;

        function addScore() {
            score = score + 1;
            document.getElementById("score").innerText = score;
        }
    </script>

</body>
</html
